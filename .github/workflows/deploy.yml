name: Deploy to GitHub Pages

# Build the static Vite bundle and publish it to GitHub Pages on every push to
# main. `base: "./"` in vite.config.ts keeps asset paths relative, so the build
# works from the project subpath (lgorzocz.github.io/survivethesprint/) with no changes.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# Least-privilege token: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build # tsc --noEmit && vite build → dist/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
